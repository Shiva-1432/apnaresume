services:
  mongodb:
    image: mongo:7
    container_name: apnaresume-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    image: ${BACKEND_IMAGE:-apnaresume-backend:local}
    build:
      context: ./backend
      args:
        BUILDER_IMAGE: ${HARDENED_NODE_BUILDER_IMAGE:-node:20.19.5-bookworm-slim}
    container_name: apnaresume-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/apnaresume
      FRONTEND_URL: http://localhost:3000
      PORT: 5000
    depends_on:
      - mongodb
    ports:
      - "5000:5000"

  frontend:
    image: ${FRONTEND_IMAGE:-apnaresume-frontend:local}
    build:
      context: ./frontend
      args:
        BUILDER_IMAGE: ${HARDENED_NODE_BUILDER_IMAGE:-node:20.19.5-bookworm-slim}
    container_name: apnaresume-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mongodb_data:
