name: Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: Deployment action
        required: true
        type: choice
        options:
          - deploy
          - rollback
        default: deploy
      environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - staging
          - production
      deploy_tag:
        description: Image tag to deploy (used when action=deploy)
        required: true
        default: latest
        type: string
      rollback_tag:
        description: Image tag to rollback to (required when action=rollback)
        required: false
        default: ''
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.names.outputs.owner_lc }}
      repo_lc: ${{ steps.names.outputs.repo_lc }}
    steps:
      - name: Derive lowercase image names
        id: names
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "repo_lc=${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]' | awk '{print "repo_lc=" $0}' >> "$GITHUB_OUTPUT"

  deploy:
    name: ${{ inputs.action == 'rollback' && 'Rollback' || 'Deploy' }} to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: preflight
    environment: ${{ inputs.environment }}

    steps:
      - name: Validate required deployment secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          test -n "$DEPLOY_HOST" || (echo "Missing secret: DEPLOY_HOST" && exit 1)
          test -n "$DEPLOY_USER" || (echo "Missing secret: DEPLOY_USER" && exit 1)
          test -n "$DEPLOY_SSH_KEY" || (echo "Missing secret: DEPLOY_SSH_KEY" && exit 1)
          test -n "$DEPLOY_PATH" || (echo "Missing secret: DEPLOY_PATH" && exit 1)

      - name: Deploy on target host
        uses: appleboy/ssh-action@v1.0.3
        env:
          OWNER_LC: ${{ needs.preflight.outputs.owner_lc }}
          REPO_LC: ${{ needs.preflight.outputs.repo_lc }}
          DEPLOY_ACTION: ${{ inputs.action }}
          DEPLOY_TAG: ${{ inputs.deploy_tag }}
          ROLLBACK_TAG: ${{ inputs.rollback_tag }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          envs: OWNER_LC,REPO_LC,DEPLOY_ACTION,DEPLOY_TAG,ROLLBACK_TAG,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            if [ "$DEPLOY_ACTION" = "rollback" ]; then
              if [ -z "$ROLLBACK_TAG" ]; then
                echo "rollback_tag is required when action=rollback"
                exit 1
              fi
              TARGET_TAG="$ROLLBACK_TAG"
              echo "Starting rollback to $TARGET_TAG"
            else
              TARGET_TAG="$DEPLOY_TAG"
              echo "Starting deploy to $TARGET_TAG"
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            export BACKEND_IMAGE="ghcr.io/$OWNER_LC/$REPO_LC-backend:$TARGET_TAG"
            export FRONTEND_IMAGE="ghcr.io/$OWNER_LC/$REPO_LC-frontend:$TARGET_TAG"

            docker pull "$BACKEND_IMAGE"
            docker pull "$FRONTEND_IMAGE"

            docker compose up -d --no-build --remove-orphans

            if [ "$DEPLOY_ACTION" = "rollback" ]; then
              echo "Rollback completed for $TARGET_TAG"
            else
              echo "Deployment completed for $TARGET_TAG"
            fi
