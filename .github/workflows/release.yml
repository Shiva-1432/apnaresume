name: Release Containers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    name: Build and Publish Images
    runs-on: ubuntu-latest
    env:
      BUILDER_IMAGE: ${{ vars.HARDENED_NODE_BUILDER_IMAGE || 'node:20.19.5-bookworm-slim' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive lowercase image names
        id: names
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "repo_lc=${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]' | awk '{print "repo_lc=" $0}' >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.names.outputs.owner_lc }}/${{ steps.names.outputs.repo_lc }}-backend
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          build-args: |
            BUILDER_IMAGE=${{ env.BUILDER_IMAGE }}

      - name: Docker metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.names.outputs.owner_lc }}/${{ steps.names.outputs.repo_lc }}-frontend
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          build-args: |
            BUILDER_IMAGE=${{ env.BUILDER_IMAGE }}
